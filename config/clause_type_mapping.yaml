# CLAUSE_TYPE_HINTS — maps LLM clause_type (English or Chinese) to BN node names.
# Used by BnMappingService to resolve risk segments to BN evidence nodes.
#
# To add hints for a new contract type:
#   Add entries below. No Python code changes needed.
#   contract_types annotation is for documentation only.

