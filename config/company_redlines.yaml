通用:
  hard_rules:
    - id: no_unlimited_liability_seller_side
      label: 卖方立场禁止无限责任
      description: 卖方不得接受无限赔偿责任。必须设置责任上限（不低于合同总价100%）并排除间接损失。
      severity: 企业红线
      applies_to: seller

    - id: liability_cap_floor_buyer_side
      label: 买方立场如设责任上限，底线为合同总价100%
      description: >
        买方立场下，无责任上限在法理上对买方有利（买方违约概率低、损失量级远小于卖方）。
        如因公司合规要求必须设置责任上限，底线为合同总价的100%，绝不得低于此比例。
        30%等低比例意味着对方只需退还少量款项即可免除全部赔偿责任——对买方不可接受。
      severity: 企业红线
      applies_to: buyer

    - id: exclude_indirect_loss
      label: 间接损失必须排除或限制
      description: 应明确排除利润损失、商誉损失、第三方索赔等间接损失
      severity: 企业红线

    - id: dispute_venue_buyer
      label: 争议管辖地优先约定甲方所在地法院
      description: 避免约定在对方所在地，否则维权成本将大幅增加
      severity: 企业红线

    - id: no_auto_acceptance
      label: 不得包含默示接受条款
      description: 不得包含"逾期视为接受"或类似默示接受条款，此类条款法律上无效且会被法院否定
      severity: 企业红线

  reasoning_hints:
    - id: liability_cap_ratio
      label: 责任上限比例按交易规模与风险分配推理
      description: 责任上限比例不得拍脑袋固定，需结合合同金额、标的属性、行业惯例和议价地位判断

    - id: damages_foreseeability
      label: 可预见规则是民法典默认规则
      description: 即使合同未写，民法典第584条已限制赔偿范围为"可预见损失"，无需额外接受宽泛赔偿条款

    - id: payment_guarantee_timing
      label: 质保金/履约保证金应在付款前提交
      description: "审查付款与担保的时间顺序，若合同要求先付全款后收支票/保函，则担保对甲方形同虚设，属于结构性风险"

    - id: penalty_base_must_be_specific
      label: 违约金基数应与具体违约义务价值挂钩
      description: "以合同总价为基数计算的违约金极易被法院调减，应改为以迟交/未履行部分价值为基数"

    - id: delivery_location_precision
      label: 交付地点应为精确地址
      description: "仅写某市辖区或甲方指定不构成有效约定，应写明精确到门牌号的地址及联系人"

    - id: no_deemed_acceptance
      label: 区分外观验收与风险转移
      description: "签字确认视为交付可能被解释为风险转移。外观初验签字仅确认数量和包装完好，不等于货物风险转移"

销售合同:
  hard_rules:
    - id: retention_not_subjective_acceptance
      label: 质保金不能完全依赖对方主观验收
      description: 尾款或质保金支付节点不能仅由对方单方认定是否"验收合格"决定
      severity: 高

    - id: no_unilateral_price_change
      label: 禁止供应商单方调价
      description: 价格条款不得赋予对方单方调价权，价格调整必须有客观触发条件和双方确认机制
      severity: 企业红线

  reasoning_hints:
    - id: acceptance_window_rule
      label: 异议期按标的物可检验性推理
      description: 外观异议期、内在质量异议期应结合标的物的可见性、施工依赖性和行业惯例判断

    - id: liquidated_damages_symmetry
      label: 违约金应对等
      description: 违约金条款应对等约束双方，避免对方享有宽限而我方承担严苛罚则

    - id: warranty_period_reasoning
      label: 质保期按行业惯例和标的属性推理
      description: 质保期长度需结合标的物属性、行业惯例判断，不应拍脑袋指定具体天数

采购合同:
  hard_rules:
    - id: third_party_inspection
      label: 必须保留第三方检测权
      description: 不得接受供应商单方检测结果为最终依据，须保留委托第三方权威机构检验的权利
      severity: 高

    - id: no_accept_before_inspection
      label: 验收前付款风险暴露禁止
      description: 不得接受先全额付款后验收的条款，付款节点应与验收通过挂钩
      severity: 企业红线

  reasoning_hints:
    - id: batch_settlement_risk
      label: 批次结算需与验收挂钩
      description: 批次结算机制需明确每批验收标准，避免以"连续供货"为由滚动占用款项

    - id: supply_guarantee_reasoning
      label: 供货保障条款需含违约救济
      description: 供货保障条款不能仅写"尽力供货"，需含断供时的替代采购权利和差价补偿

租赁合同:
  hard_rules:
    - id: deposit_return_timeline
      label: 押金/履约保证金退还须有明确时限
      description: >
        押金或履约保证金必须在租赁期满腾房后明确时限内（通常不超过30日）退还，
        退还条件须客观可验证（如无欠租、无损坏），不得以"协商一致"等主观标准为由无限期扣留
      severity: 企业红线

    - id: holdover_penalty_ceiling
      label: 逾期腾房违约金须有合理倍数和总额上限
      description: >
        逾期腾房的日罚金不得超过日租金的2-3倍，且必须设置总额上限（如不超过一个月租金）。
        无上限的"日租金5倍+连带第三方损失"条款可能被认定为显失公平，
        但更应在签署前修正，而非依赖诉讼调减。
      severity: 企业红线

    - id: cooperation_duty_must_not_trigger_immediate_termination
      label: 配合融资/办证照义务不得触发立即解约权
      description: >
        承租方配合出租方融资、办理产权证照等义务的违约后果应为实际损失赔偿，
        不得赋予出租方立即解约权或没收全部押金的权利。
        此类配合义务与租赁核心义务（付租、维护）性质不同，违约后果应对等。
      severity: 企业红线

    - id: rent_prepayment_must_be_proportional
      label: 年付/半年付租金须有交付条件或担保对冲
      description: >
        租赁合同要求签订后短期内一次性支付全年或半年租金的，
        须与房屋交付验收挂钩，或由出租方提供等额担保（如银行保函）。
        大型商业租赁中全额预付无担保属于结构性资金风险，不得接受。
      severity: 企业红线

    - id: improvements_ownership_clarity
      label: 装修及添附物权属须明确
      description: >
        承租方投入的装修、改造、设备安装等形成的添附物，其权属和处置方式须在合同中明确。
        不得接受"一切装修无偿归出租方所有"且承租方须"恢复原状"的双重义务条款
      severity: 高

    - id: maintenance_responsibility_allocation
      label: 维修责任须按主体结构/日常使用清晰划分
      description: >
        房屋主体结构、公共区域、核心设备（电梯/消防/供水供电）的维修责任应由出租方承担；
        承租方仅承担日常使用范围内的维护。不得接受"一切维修由承租方负责"的兜底条款
      severity: 高

  reasoning_hints:
    - id: rent_escalation_transparency
      label: 租金调涨机制须透明可预期
      description: 长期租赁合同中的租金递增条款应基于客观指数（如CPI）或固定比例，不得赋予出租方单方任意调价权

    - id: sublease_and_assignment_rights
      label: 转租与合同转让权须合理
      description: 承租方的转租权和合同转让权不应被完全禁止。合理的安排是"经出租方书面同意（不得无理拒绝）"

    - id: utility_fee_adjustment
      label: 水电费等公用事业收费应按实际用量结算
      description: 不得接受固定偏高单价且无调整机制的水电费条款，应约定按政府定价或市场标准实报实销

    - id: early_termination_compensation_symmetry
      label: 提前解约补偿应对等
      description: 出租方提前解约的补偿（如退还剩余租金+押金）应与承租方提前解约的后果（如没收押金）基本对等，不得一方零成本解约、另一方没收全部押金

劳动/聘用合同:
  hard_rules:
    - id: probation_period_statutory_cap
      label: 试用期不得超过法定期限
      description: >
        劳动合同期限3个月以上不满1年的，试用期不超过1个月；1年以上不满3年的，不超过2个月；
        3年以上或无固定期限的，不超过6个月（劳动合同法第19条）。超期试用部分无效，
        且超期期间视为已过试用期、应按转正后工资支付。
      severity: 企业红线

    - id: non_compete_must_have_compensation
      label: 竞业限制必须有经济补偿
      description: >
        竞业限制条款必须约定经济补偿金，补偿标准不低于劳动合同终止前12个月平均工资的30%
        且不低于当地最低工资标准（劳动合同法第23条、最高法司法解释）。
        未约定补偿金的竞业限制条款对劳动者无约束力。
      severity: 企业红线

    - id: liquidated_damages_restriction_labor
      label: 劳动合同违约金严格限制
      description: >
        劳动合同法第22条和第25条明确规定：除专项培训服务期和竞业限制两种情形外，
        不得约定由劳动者承担的违约金。任何其他名目的违约金（如"提前离职赔偿"、
        "工作不满X年罚款"）均为违法无效条款。
      severity: 企业红线

    - id: unilateral_termination_restriction
      label: 雇主单方解除权不得任意扩大
      description: >
        雇主单方解除劳动合同的法定情形限于劳动合同法第39-41条（严重违纪、不胜任工作经培训仍不胜任、
        经济性裁员等）。合同中不得约定超出法定范围的单方解雇条件。如约定"业绩不达标即可解除"
        的，应对业绩指标设定客观、可量化的标准，并配套改进计划（PIP）。
      severity: 企业红线

    - id: social_insurance_not_waivable
      label: 社保缴纳义务不可约定免除
      description: >
        用人单位依法缴纳社会保险是强制性义务（社会保险法第58条），不得以任何约定形式免除或转嫁。
        "员工自愿放弃社保"、"社保折现发放"等条款均为无效条款，且用人单位将面临补缴+滞纳金+罚款风险。
      severity: 企业红线

  reasoning_hints:
    - id: probation_salary_floor
      label: 试用期工资不低于转正工资80%
      description: 试用期工资不得低于正式工资的80%且不低于当地最低工资。低于此标准的约定违法

    - id: overtime_structure_legal
      label: 加班工资计算基数须合法
      description: 加班工资基数不得低于劳动合同约定的工资标准，不得以"包干工资已含加班费"为由规避加班费支付义务

    - id: severance_calculation_clarity
      label: 经济补偿金计算须符合法定标准
      description: 经济补偿金按工作年限×月工资计算（劳动合同法第47条），不得在合同中约定低于法定标准的赔偿方案

工程承包/施工合同:
  hard_rules:
    - id: no_uncollateralized_contractor_financing
      label: 禁止要求施工方无担保垫资
      description: >
        发包方要求施工方垫资施工的，必须提供等额支付担保（银行保函或不动产抵押）。
        无担保垫资实质是发包方将资金风险单方转移至施工方，在工程款拖欠高发的行业背景下
        属于结构性致命风险。依据：建设工程司法解释一第25条。
      severity: 企业红线

    - id: acceptance_criteria_must_be_objective
      label: 验收标准必须客观、可验证
      description: >
        竣工验收标准不得使用"发包方满意"、"符合发包方预期"等主观表述。验收标准须引用
        具体的国家/行业规范编号、技术指标数值或双方确认的设计文件版本号。
        主观验收条款赋予发包方单方否决权，构成显失公平。
      severity: 企业红线

    - id: variation_order_process_required
      label: 工程变更签证流程必须明确
      description: >
        合同须明确变更签证的发起流程、确认时限、计价方式和逾期未确认的默认规则。
        不得接受"发包方可随时要求变更、施工方不得拒绝且价格另行协商"的单方变更权条款。
        无流程约定的变更是工程结算争议的首要来源。
      severity: 企业红线

    - id: retention_money_release_schedule
      label: 质保金返还须有明确时限和条件
      description: >
        质量保证金返还期限须明确（如竣工验收合格后2年），返还条件须客观
        （如无未修复质量缺陷），不得以"双方协商一致"等主观条件为由无限期扣留。
        依据：建质[2017]138号规定质保金比例不得超过工程价款结算总额的3%。
      severity: 高

    - id: completion_settlement_timeline
      label: 竣工结算须有明确时限
      description: >
        发包方须在收到竣工结算文件后28日内完成审核并提出意见（建设工程司法解释一第20条）。
        合同中不得以"审计完成后支付"等无明确截止日期的条件作为结算前提。
        逾期未答复的视为认可结算文件。
      severity: 企业红线

  reasoning_hints:
    - id: extension_of_time_grounds
      label: 工期顺延条件须合理并对等
      description: 工期顺延条件应包括发包方原因（变更、付款延迟、甲供材延误）、不可抗力、异常恶劣天气等。违约金仅针对施工方原因造成的延误

    - id: force_majeure_scope_construction
      label: 不可抗力范围须结合工程所在地
      description: 不可抗力条款应结合工程所在地的气候条件（台风、暴雨、严寒）和地质条件具体列举，不能简单写"双方协商认定"

    - id: subcontractor_liability_chain
      label: 分包商责任传导机制须明确
      description: 如允许分包，合同须明确总包对分包商的质量、安全、工期承担连带责任，并约定分包商违约时总包的追偿机制

借款/抵押/担保合同:
  hard_rules:
    - id: interest_rate_statutory_cap
      label: 利率不得超过LPR四倍上限
      description: >
        借贷利率不得超过合同成立时一年期贷款市场报价利率（LPR）的四倍
        （民法典第680条、民间借贷司法解释第25条）。超出部分的利息约定无效，
        债务人已支付的超限利息可主张返还。即使是商业借贷亦受此上限约束。
      severity: 企业红线

    - id: guarantee_type_must_be_explicit
      label: 保证方式必须明确约定
      description: >
        保证条款必须明确约定为"一般保证"或"连带责任保证"（民法典第686条）。
        约定不明的，推定为一般保证——这意味着债权人须先起诉债务人、执行无果后
        才能向保证人主张。如希望直接向保证人追偿，须明确写明"连带责任保证"。
      severity: 企业红线

    - id: no_foreclosure_clause
      label: 禁止流押/流质条款
      description: >
        抵押合同中不得约定"债务到期未清偿则抵押财产归债权人所有"（民法典第401条）。
        此类流押/流质条款自始无效。抵押权实现必须通过折价、拍卖或变卖方式，
        抵押物价款超过债权部分须返还抵押人。
      severity: 企业红线

    - id: acceleration_clause_requires_notice
      label: 提前到期/加速清偿条款须含通知和宽限期
      description: >
        合同中约定债权人在特定情形下可宣布贷款提前到期的（加速清偿条款），
        必须包含书面通知义务和合理宽限期（通常不低于15个工作日）。
        无通知、无宽限期的立即到期条款可能被视为加重对方责任的格式条款而无效。
      severity: 企业红线

    - id: mortgage_registration_obligation_clear
      label: 抵押登记义务和时间节点必须明确
      description: >
        合同须明确约定抵押人完成抵押登记的期限（如合同生效后30个工作日内）、
        登记费用承担方和未按期登记的违约责任。未登记的抵押权不具有对抗善意
        第三人的效力（民法典第403条），等于无担保。
      severity: 企业红线

  reasoning_hints:
    - id: guarantee_scope_certainty
      label: 担保范围须明确且不过度扩张
      description: 保证担保范围须明确列明（本金、利息、违约金、损害赔偿金、实现债权的费用），避免模糊的"一切债务"式兜底表述

    - id: guarantee_period_reasonability
      label: 保证期间须合理且明确起算点
      description: 保证期间约定须明确起算点（主债务履行期届满之日）和长度。未约定的推定6个月（民法典第692条），过短的期间可能导致担保落空

    - id: joint_debtor_liability_chain
      label: 共同债务人之间的追偿机制
      description: 多人共同借款或共同担保的，合同须明确各方的债务份额/担保份额以及一方向债权人清偿超过自己份额后的追偿权
